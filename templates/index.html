<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Caption Generator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Image Caption Generator</h1>

            <p>
                Upload an image and generate a caption using Deep Learning.
            </p>

            <form action="/predict"
                  method="POST"
                  enctype="multipart/form-data">

                <input type="file"
                       name="image"
                       accept="image/*"
                       required>

                <button type="submit">
                    Generate Caption
                </button>

            </form>

        </div>

    </div>

</body>
</html>
